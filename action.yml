name: 'Auto-generate PR Description'
description: 'Automatically generates pull request descriptions using OpenAI when a PR is created or updated.'
author: 'Yuri V'
runs:
  using: 'node20'
  main: 'dist/index.js'
inputs:
  openai_api_key:
    description: 'Your OpenAI API Key'
    required: true
  openai_model:
    description: 'OpenAI model to use (e.g., gpt-5.4-mini, gpt-4o)'
    required: false
    default: 'gpt-5.4-mini'
  github_token:
    description: 'GitHub token with repo permissions'
    required: true
    default: '${{ github.token }}'
  temperature:
    description: 'Sampling temperature for OpenAI (0.0 to 1.0)'
    required: false
    default: '0.7'
outputs:
  pr_number:
    description: 'The number of the pull request updated'
  description:
    description: 'The generated pull request description'
branding:
  icon: 'git-pull-request'
  color: 'green'
